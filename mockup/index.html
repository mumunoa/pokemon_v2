<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TCG Practice - Sandbox</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <header class="glass-panel main-header">
      <button class="icon-btn settings-btn">
        設定
      </button>
      <div class="turn-indicator">TURN: プレイヤー 1</div>
      <button class="primary-btn menu-btn">Log</button>
    </header>

    <main class="battle-arena">
      <!-- OPPONENT FIELD -->
      <div class="field opponent-field">
        <div class="bench-row">
          <div class="bench-zone">
            <div class="bench-slot">
              <div class="card opponent-card-back"></div>
            </div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
          </div>
        </div>
        <div class="active-row">
          <div class="prizes-zone horizontal-prizes" style="margin-top: 10px;">
            <div class="zone-label" style="top: -30px;">サイド<br>(横向き)</div>
            <div class="prize-card opponent-card-back" style="top:0px; z-index:1;"></div>
            <div class="prize-card opponent-card-back" style="top:6px; z-index:2;"></div>
            <div class="prize-card opponent-card-back" style="top:12px; z-index:3;"></div>
            <div class="prize-card opponent-card-back" style="top:18px; z-index:4;"></div>
            <div class="prize-card opponent-card-back" style="top:24px; z-index:5;"></div>
            <div class="prize-card opponent-card-back" style="top:30px; z-index:6;"></div>
          </div>
          <div class="battle-zone">
            <div class="card active-pokemon opponent-card-back"></div>
          </div>
          <div class="deck-trash-zone">
            <div class="trash-zone horizontal-card">
              <div class="zone-label" style="top: -30px;">トラッシュ<br>(横向き)</div>
              <div class="deck-stack opponent-card-back" style="width:100%; height:100%;"></div>
            </div>
            <div class="deck-zone horizontal-card">
              <div class="zone-label" style="top: -30px;">山札<br>(横向き)</div>
              <div class="deck-stack opponent-card-back" style="width:100%; height:100%;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- MIDDLE DIVIDER (Stadium & Actions) -->
      <div class="mid-divider custom-mid">
        <div class="stadium-slot square-stadium">スタジアム</div>
        <button class="primary-btn end-turn-btn" style="position: absolute; right: 20px;">相手視点に切替</button>
      </div>

      <!-- PLAYER FIELD -->
      <div class="field player-field border-glow">
        <div class="active-row">
          <div class="prizes-zone horizontal-prizes">
            <div class="zone-label" style="bottom: -35px; top:auto;">サイド<br>(横向き)</div>
            <div class="prize-card player-card-back" style="bottom:30px; z-index:1;"></div>
            <div class="prize-card player-card-back" style="bottom:24px; z-index:2;"></div>
            <div class="prize-card player-card-back" style="bottom:18px; z-index:3;"></div>
            <div class="prize-card player-card-back" style="bottom:12px; z-index:4;"></div>
            <div class="prize-card player-card-back" style="bottom:6px; z-index:5;"></div>
            <div class="prize-card player-card-back" style="bottom:0px; z-index:6;"></div>
          </div>
          <div class="battle-zone">
            <div class="card active-pokemon card-image-2 action-trigger">
              <div class="card-title">リザードンex</div>
              <div class="card-overlay highlight">
                <div class="status-top-right">
                  <div class="hp-text">330</div>
                  <div class="hp-bar-container">
                    <div class="hp-bar" style="width: 100%;"></div>
                  </div>
                </div>
                <div class="status-bottom-left">
                  <div class="energy-icon fire"></div>
                  <div class="energy-icon fire"></div>
                </div>
                <div class="damage-counter">-50</div>
              </div>
            </div>
          </div>
          <div class="deck-trash-zone">
            <div class="deck-zone horizontal-card">
              <div class="zone-label" style="top: -30px;">山札<br>(横向き)</div>
              <div class="deck-stack player-card-back" style="width:100%; height:100%;"></div>
            </div>
            <div class="trash-zone horizontal-card">
              <div class="zone-label" style="top: -30px;">トラッシュ<br>(横向き)</div>
              <div class="deck-stack player-card-back" style="width:100%; height:100%;"></div>
            </div>
          </div>
        </div>
        <div class="bench-row">
          <div class="bench-zone">
            <div class="bench-slot">
              <!-- Example Pokemon Custom Overlay -->
              <div class="card card-image-1 action-trigger">
                <div class="card-title">ピカチュウex</div>
                <div class="card-overlay">
                  <div class="status-top-right">
                    <div class="hp-text">160</div>
                    <div class="hp-bar-container">
                      <div class="hp-bar" style="width: 80%;"></div>
                    </div>
                  </div>
                  <div class="status-bottom-left">
                    <div class="energy-icon electric"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
            <div class="bench-slot"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- PLAYER HAND -->
    <footer class="player-hand">
      <div class="hand-container">
        <!-- 山なりになるように、中央が高く(offset 0)、端が低く(offset 正の数値で下に下がる)なるよう設定 -->
        <div class="hand-card card-image-3" style="--rotation: -10deg; --offset: 40px;">
          <div class="card-title">ハイパーボール</div>
        </div>
        <div class="hand-card card-image-4" style="--rotation: -5deg; --offset: 15px;">
          <div class="card-title">ナンジャモ</div>
        </div>
        <div class="hand-card card-image-1" style="--rotation: 0deg; --offset: 0px;">
          <div class="card-title">ピカチュウex</div>
        </div>
        <div class="hand-card card-image-2" style="--rotation: 5deg; --offset: 15px;">
          <div class="card-title">炎エネルギー</div>
        </div>
        <div class="hand-card card-image-3" style="--rotation: 10deg; --offset: 40px;">
          <div class="card-title">ポケギア3.0</div>
        </div>
      </div>
    </footer>

    <!-- Action Popup Modal -->
    <div id="action-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-card-preview card-image-2"></div>
        <div class="modal-actions">
          <button class="action-btn">【特性】れんごくしはい</button>
          <button class="action-btn attack">【ワザ】バーニングダーク (180+)</button>
          <button class="action-btn retreat">【にげる】 炎炎</button>
          <button class="action-btn close-modal">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
